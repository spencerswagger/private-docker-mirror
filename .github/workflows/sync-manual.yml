name: Sync Manually

on:
  workflow_dispatch:
    inputs:
      image:
        description: 'Manually synchronize a image'
        required: true
        type: string
      max_parallel:
        description: 'Maximum number of parallel sync tasks (default: 10)'
        required: false
        default: '10'
        type: string
      sync_only_popular_tags:
        description: 'Only sync popular tags (latest, major versions, skip rc/beta/dev)'
        required: false
        default: 'false'
        type: string

jobs:
  sync-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up skopeo
        run: |
          wget https://github.com/lework/skopeo-binary/releases/download/v1.22.0/skopeo-linux-amd64 -O /usr/local/bin/skopeo && chmod +x /usr/local/bin/skopeo
          skopeo --version
      - name: Login to Docker Hub using Skopeo
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "${DOCKER_PASSWORD}" | skopeo login --username ${DOCKER_USERNAME} --password-stdin registry.cn-hangzhou.aliyuncs.com
      - name: Override image.txt
        run: |
          echo ${{ github.event.inputs.image }} > image.txt
      - name: Chmod
        run: |
          chmod +x ./sync.sh
          chmod +x ./diff-image.sh
      - name: Sync Images
        env:
          MAX_PARALLEL: ${{ github.event.inputs.max_parallel || 10 }}
          SYNC_ONLY_POPULAR_TAGS: ${{ github.event.inputs.sync_only_popular_tags || 'false' }}
        run: |
          echo "开始手动同步镜像：${{ github.event.inputs.image }}"
          echo "最大并行数：${MAX_PARALLEL}"
          echo "只同步热门标签：${SYNC_ONLY_POPULAR_TAGS}"
          ./sync.sh

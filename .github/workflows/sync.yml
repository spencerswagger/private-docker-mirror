name: Sync

on:
  schedule:
    - cron: "0 12,18 * * *"

  workflow_dispatch:
    inputs:
      max_parallel:
        description: 'Maximum number of parallel sync tasks (default: 3)'
        required: false
        default: '10'
        type: string

jobs:
  sync-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up skopeo
        run: |
          wget https://github.com/lework/skopeo-binary/releases/download/v1.13.3/skopeo-linux-amd64 -O /usr/local/bin/skopeo && chmod +x /usr/local/bin/skopeo
          skopeo --version
      - name: Login to Docker Hub using Skopeo
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "${DOCKER_PASSWORD}" | skopeo login --username ${DOCKER_USERNAME} --password-stdin registry.cn-hangzhou.aliyuncs.com
      - name: Chmod
        run: |
          chmod +x ./sync.sh
          chmod +x ./diff-image.sh
      - name: Sync Images
        env:
          MAX_PARALLEL: ${{ github.event.inputs.max_parallel || 3 }}
        run: |
          echo "开始并行同步镜像，最大并发数：${MAX_PARALLEL}"
          ./sync.sh